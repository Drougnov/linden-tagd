        </h1>

        </p>

                    </span>
                </button>
            </li>
        </ul>

        <!-- button-version - create-tag-button -->
        <button type="button" data-component="create-tag-button" data-action="create-custom-tag" data-state="default"
            data-variant="primary" data-size="sm"
            class="inline-flex w-max items-center justify-center gap-button-gap rounded-pill bg-altButton px-tag-x-md py-tag-y text-sm font-semibold leading-tagSmall tracking-tagSmall text-text-inverse transition hover:bg-altButton/90 active:bg-altButton/95 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-border-focus focus-visible:ring-offset-2 dark:bg-altButton-dark dark:text-text-inverseDark">
            <span data-element="button-label">
                Create your own tags
            </span>

            <img data-element="button-icon" class="h-button-icon w-button-icon filter-icon-inverse"
                src="https://i.ibb.co.com/zVHWJPfM/plus.webp" alt="" aria-hidden="true" />
        </button>

        <!-- search - empty -->
        <form data-component="interest-search" data-state="empty" role="search"
            class="group/search flex items-center gap-search-gap">
            <div data-element="search-field"
                class="flex w-full items-center gap-search-field-gap rounded-input border border-search-border bg-search-surface p-search-field-padding transition dark:border-search-borderDark dark:bg-search-surfaceDark">
                <img data-element="search-icon" class="h-search-icon w-search-icon shrink-0 filter-icon-primary"
                    src="https://i.ibb.co.com/XrnX4Z04/search-magnifying-glass.webp" alt="" aria-hidden="true" />

                <input data-element="search-input"
                    class="hide-search-cancel h-full w-full bg-transparent text-base font-medium text-text-heading outline-none placeholder:text-text-description focus:outline-none dark:text-text-headingDark dark:placeholder:text-text-descriptionDark"
                    type="search" name="interest-search" autocomplete="off" aria-label="Search for interests"
                    placeholder="Search for interests" />

                <button type="button" data-action="clear-search" data-element="search-clear-button"
                    class="hidden h-search-clear-icon w-search-clear-icon shrink-0 items-center justify-center focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-border-focus focus-visible:ring-offset-2 group-data-[state=has-value]/search:inline-flex"
                    aria-label="Clear search">
                    <img data-element="search-clear-icon" class="h-full w-full filter-icon-primary"
                        src="https://i.ibb.co.com/ZR7FxmMD/close-circle.webp" alt="" aria-hidden="true" />
                </button>
            </div>

            <button type="button" data-action="close-search" data-element="search-close-button"
                class="inline-flex shrink-0 items-center justify-center rounded-full bg-surface-page p-search-close-padding transition hover:bg-surface-disabled focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-border-focus focus-visible:ring-offset-2 dark:bg-surface-pageDark dark:hover:bg-surface-disabledDark"
                aria-label="Close search">
                <img data-element="search-close-icon"
                    class="h-search-close-icon w-search-close-icon filter-icon-primary"
                    src="https://i.ibb.co.com/hJfdxBR2/cross.webp" alt="" aria-hidden="true" />
            </button>
        </form>

        <!-- search: has-value -->
        <form data-component="interest-search" data-state="has-value" role="search"
            class="group/search flex items-center gap-search-gap">
            <div data-element="search-field"
                class="flex w-full items-center gap-search-field-gap rounded-input border border-search-border bg-search-surface p-search-field-padding transition dark:border-search-borderDark dark:bg-search-surfaceDark">
                <img data-element="search-icon" class="h-search-icon w-search-icon shrink-0 filter-icon-primary"
                    src="https://i.ibb.co.com/XrnX4Z04/search-magnifying-glass.webp" alt="" aria-hidden="true" />

                <input data-element="search-input"
                    class="hide-search-cancel h-full w-full bg-transparent text-base font-medium text-text-heading outline-none placeholder:text-text-description focus:outline-none dark:text-text-headingDark dark:placeholder:text-text-descriptionDark"
                    type="search" name="interest-search" autocomplete="off" aria-label="Search for interests"
                    placeholder="Search for interests" value="Adv" />

                <button type="button" data-action="clear-search" data-element="search-clear-button"
                    class="hidden h-search-clear-icon w-search-clear-icon shrink-0 items-center justify-center focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-border-focus focus-visible:ring-offset-2 group-data-[state=has-value]/search:inline-flex"
                    aria-label="Clear search">
                    <img data-element="search-clear-icon" class="h-full w-full filter-icon-primary"
                        src="https://i.ibb.co.com/ZR7FxmMD/close-circle.webp" alt="" aria-hidden="true" />
                </button>
            </div>

            <button type="button" data-action="close-search" data-element="search-close-button"
                class="inline-flex shrink-0 items-center justify-center rounded-full bg-surface-page p-search-close-padding transition hover:bg-surface-disabled focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-border-focus focus-visible:ring-offset-2 dark:bg-surface-pageDark dark:hover:bg-surface-disabledDark"
                aria-label="Close search">
                <img data-element="search-close-icon"
                    class="h-search-close-icon w-search-close-icon filter-icon-primary"
                    src="https://i.ibb.co.com/hJfdxBR2/cross.webp" alt="" aria-hidden="true" />
            </button>
        </form>

        <!-- notification-banner-container -->
        <div class="relative w-full h-notification-container overflow-x-hidden">
            <div data-component="notification-container"
                class="absolute left-1/2 top-1/2 h-notification-container w-notification-container -translate-x-1/2 -translate-y-1/2 overflow-hidden">
                <!-- background-pattern -->
                <div aria-hidden="true"
                    class="pointer-events-none absolute inset-0 bg-[url('https://i.ibb.co.com/YF7PyZJm/notification-banner-icon.webp')] bg-contain bg-no-repeat bg-center opacity-5">
                </div>

                <!-- notification-content -->
                <div class="relative z-upload-overlay">
                </div>
            </div>
        </div>
    </main>


</body>

</html>
