<body class="min-h-screen overflow-y-auto bg-surface-page p-0 m-0 font-sans dark:bg-surface-pageDark">

    <!-- components-wrapper (added demo max-width and padding for mobile) -->

        <!-- default-button Disabled state preview -->

            <span data-element="button-label">
                Continue
            </span>
        </button>


        <!-- default-button Default state preview -->

            <span data-element="button-label">
                Continue
            </span>

            <span data-element="button-label">Man</span>

        <!-- alt-button-1 -->

            <span data-element="button-label">Genderfluid</span>
        </button>

            </div>

            <span data-element="progress-label"

                1/9
            </span>
        </div>

        <!-- default-heading -->
        <h1 data-element="default-heading"
            class="text-2xl font-bold leading-9 tracking-heading text-text-heading dark:text-text-headingDark">
            Enter your number
        </h1>

        <!-- default-description -->
        <p data-element="default-description"
            class="text-sm font-medium leading-description text-text-description dark:text-text-descriptionDark">
            We’ll use it to send you verification code.
        </p>

                <input data-element="input"
                    class="w-full bg-transparent text-base text-text-input outline-none placeholder:text-text-description focus:outline-none dark:text-text-inputDark dark:placeholder:text-text-descriptionDark"
                    type="email" name="email" autocomplete="email" inputmode="email" aria-label="Email address"
                    aria-invalid="false" aria-describedby="email-error-message-default"
                    placeholder="example@gmail.com" />
            </div>

            <!-- default-error-text -->
            <span id="email-error-message-default" data-element="input-error-message"
                class="hidden text-xs font-medium tracking-status text-danger group-data-[state=error]/input:block dark:text-danger-dark">
                Invalid email
            </span>
        </div>

        <!-- input-version-#1 on error -->

            <div data-component="input-field" data-state="error" data-variant="email" data-size="md"
                class="w-full rounded-input border-2 bg-surface-page px-input-x py-input-y transition data-[state=default]:border-border-input data-[state=default]:focus-within:border-border-inputFocus data-[state=error]:border-danger data-[state=error]:focus-within:border-danger dark:bg-surface-pageDark dark:data-[state=default]:border-border-inputDark dark:data-[state=default]:focus-within:border-border-inputFocusDark dark:data-[state=error]:border-danger-dark dark:data-[state=error]:focus-within:border-danger-dark">
                <input data-element="input"

                    aria-invalid="true" aria-describedby="email-error-message-error" placeholder="example@gmail.com"

            <!-- default-error-text -->
            <span id="email-error-message-error" data-element="input-error-message"
                class="hidden text-xs font-medium tracking-status text-danger group-data-[state=error]/input:block dark:text-danger-dark">

            <!-- image-upload-card: loading -->
            <div data-component="image-upload-card" data-state="loading" data-upload-slot="2"
                class="group/upload-card relative flex aspect-uploadCard w-full items-center justify-center overflow-hidden rounded-xl bg-upload-surface dark:bg-upload-surfaceDark">

                    class="hidden h-full w-full cursor-pointer items-center justify-center group-data-[state=empty]/upload-card:flex focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-border-focus focus-visible:ring-offset-2"
                    aria-label="Upload image">
                    <img data-element="empty-state-icon"
                        class="h-upload-add-icon w-upload-add-icon [filter:brightness(0)_saturate(100%)_invert(23%)_sepia(88%)_saturate(1449%)_hue-rotate(180deg)_brightness(95%)_contrast(103%)]"
                        src="https://i.ibb.co.com/zVHWJPfM/plus.webp" alt="" aria-hidden="true" />
                </button>

                <!-- loading-state -->
                <div data-element="loading-state"
                    class="relative hidden h-full w-full items-center justify-center group-data-[state=loading]/upload-card:flex"
                    aria-busy="true">
                    <div data-element="loading-overlay"
                        class="absolute inset-0 z-upload-overlay flex items-center justify-center bg-overlay-upload dark:bg-overlay-uploadDark">
                        <img data-element="loading-spinner"

                </div>

                                <img data-element="edit-icon"

                        class="absolute inset-0 z-upload-overlay flex items-center justify-center bg-overlay-upload dark:bg-overlay-uploadDark">
                        <img data-element="loading-spinner"
                            class="h-upload-spinner-size w-upload-spinner-size animate-spin motion-reduce:animate-none [filter:brightness(0)_saturate(100%)_invert(100%)_sepia(0%)_saturate(1%)_hue-rotate(241deg)_brightness(113%)_contrast(101%)]"
                            src="https://i.ibb.co.com/G4HWgm26/spinner-round-30.webp" alt="" aria-hidden="true" />
                    </div>

                    <img data-element="uploaded-image-preview" class="z-upload-base h-full w-full object-cover"
                        src="https://i.ibb.co.com/G3P7dB6Z/uploaded-photo.webp" alt="Uploaded photo preview" />
                </div>

                <!-- loaded-state -->
                <div data-element="loaded-state"
                    class="relative hidden h-full w-full items-center justify-center group-data-[state=loaded]/upload-card:flex">
                    <div data-element="image-actions" class="absolute inset-0 z-upload-overlay">
                        <div data-element="image-action-list"
                            class="absolute bottom-upload-action-offset-y right-upload-action-offset-x flex flex-col gap-upload-action-gap">
                            <button type="button" data-action="edit-image"
                                class="inline-flex h-upload-action-size w-upload-action-size cursor-pointer items-center justify-center rounded-full bg-surface-page transition hover:bg-surface-disabled focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-border-focus focus-visible:ring-offset-2 dark:bg-surface-pageDark dark:hover:bg-surface-disabledDark"
                                aria-label="Edit image">
                                <img data-element="edit-icon"
                                    class="h-upload-action-icon w-upload-action-icon [filter:brightness(0)_saturate(100%)_invert(7%)_sepia(80%)_saturate(3253%)_hue-rotate(211deg)_brightness(95%)_contrast(99%)]"
                                    src="https://i.ibb.co.com/jv2LVHT5/edit-pencil.webp" alt="" aria-hidden="true" />
                            </button>

                            <button type="button" data-action="remove-image"
                                class="inline-flex h-upload-action-size w-upload-action-size cursor-pointer items-center justify-center rounded-full bg-surface-page transition hover:bg-surface-disabled focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-border-focus focus-visible:ring-offset-2 dark:bg-surface-pageDark dark:hover:bg-surface-disabledDark"
                                aria-label="Remove image">
                                <img data-element="remove-icon"
                                    class="h-upload-action-icon w-upload-action-icon [filter:brightness(0)_saturate(100%)_invert(7%)_sepia(80%)_saturate(3253%)_hue-rotate(211deg)_brightness(95%)_contrast(99%)]"
                                    src="https://i.ibb.co.com/1Jfm0mMM/close-cross.webp" alt="" aria-hidden="true" />
                            </button>
                        </div>
                    </div>

                    <img data-element="uploaded-image" class="z-upload-base h-full w-full object-cover"
                        src="https://i.ibb.co.com/G3P7dB6Z/uploaded-photo.webp" alt="Uploaded photo" />
                </div>
            </div>
        </div>
    </main>


</body>

</html>
